spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

dashscope:
  api-key: ${DASHSCOPE_API_KEY}
  model: qwen-plus
  embedding-model: text-embedding-v4
  embedding-url: https://dashscope.aliyuncs.com/compatible-mode/v1/embeddings
  embedding-dimensions: 1024
  rerank-model: qwen3-rerank
  rerank-url: https://dashscope.aliyuncs.com/compatible-api/v1/reranks

qdrant:
  host: ${QDRANT_HOST:localhost}
  port: ${QDRANT_PORT:6334}
  collection-name: flowmind_knowledge

flowmind:
  upload-dir: ${UPLOAD_DIR:/data/flowmind/uploads}
  chunk:
    size: 500
    overlap: 100
  rag:
    rate-limit:
      enabled: ${RAG_RATE_LIMIT_ENABLED:true}
      daily-limit: ${RAG_DAILY_LIMIT:10}
    pipeline:
      query-rewrite-enabled: ${RAG_QUERY_REWRITE_ENABLED:false}
      multi-query-enabled: ${RAG_MULTI_QUERY_ENABLED:false}
      max-multi-queries: ${RAG_MAX_MULTI_QUERIES:3}
      keyword-search-enabled: ${RAG_KEYWORD_SEARCH_ENABLED:true}
      context-compression-enabled: ${RAG_CONTEXT_COMPRESSION_ENABLED:true}
      rerank-enabled: ${RAG_RERANK_ENABLED:true}
      timing-log-enabled: ${RAG_TIMING_LOG_ENABLED:true}
