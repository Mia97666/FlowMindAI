server:
  port: 8080

spring:
  application:
    name: flowmind-server
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:flowmind}
    username: ${DB_USERNAME:flowmind}
    password: ${DB_PASSWORD:flowmind123}
    driver-class-name: org.postgresql.Driver

management:
  endpoints:
    web:
      exposure:
        include: health,info