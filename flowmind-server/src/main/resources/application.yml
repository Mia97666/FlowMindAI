server:
  port: 8080

spring:
  application:
    name: flowmind-server
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:flowmind}
    username: ${DB_USERNAME:flowmind}
    password: ${DB_PASSWORD:flowmind123}
    driver-class-name: org.postgresql.Driver

management:
  endpoints:
    web:
      exposure:
        include: health,info

flowmind:
  rag:
    # 测试阶段 RAG 调用限流，关闭后不限流
    rate-limit:
      enabled: true
      # 每天全局最大调用次数（非按用户）
      daily-limit: 5